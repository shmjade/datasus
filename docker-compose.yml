# =============================================================================
# DataSUS — Docker Compose
# Stack: PostgreSQL · Zookeeper · Kafka · Kafka UI · Apache Spark
#
# Uso:
#   docker compose up -d          → sobe todos os serviços
#   docker compose ps             → verifica status
#   docker compose logs -f kafka  → acompanha logs do broker
#   docker compose down -v        → destrói containers e volumes
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16 — Banco relacional principal
  # Schemas: raw, trusted, refined (padrão Medallion)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: datasus_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datasus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datasus_secret}
      POSTGRES_DB: ${POSTGRES_DB:-datasus_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - datasus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datasus} -d ${POSTGRES_DB:-datasus_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Zookeeper — Coordenação do cluster Kafka
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: datasus_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - datasus-net
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Kafka — Message broker para simulação de eventos de triagem
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: datasus_kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "9101:9101"  # JMX para monitoramento
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./infra/kafka/topics.sh:/opt/datasus/topics.sh:ro
    networks:
      - datasus-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ---------------------------------------------------------------------------
  # Kafka UI — Interface web para inspeção de tópicos e mensagens
  # Acesso: http://localhost:8080
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: datasus_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: datasus-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - datasus-net

  # ---------------------------------------------------------------------------
  # Apache Spark — Processamento batch (PySpark local mode)
  # Master UI: http://localhost:8081
  # ---------------------------------------------------------------------------
  spark:
    image: bitnami/spark:latest
    container_name: datasus_spark
    restart: unless-stopped
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    ports:
      - "8081:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master port
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./pipelines:/opt/bitnami/spark/pipelines
    networks:
      - datasus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Ingestor — supercronic + pysus
  # Agenda mensal (infra/cron/crontab): baixa AIH novas do FTP DataSUS,
  # converte .dbc → parquet em data/lake/bronze/, avança o watermark.
  #
  # Backfill manual:
  #   docker compose run --rm ingestor backfill
  # Debug:
  #   docker compose logs -f ingestor
  # ---------------------------------------------------------------------------
  ingestor:
    build:
      context: .
      dockerfile: infra/cron/Dockerfile
    container_name: datasus_ingestor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      INGEST_DATA_ROOT: /app/data
    volumes:
      - ./data:/app/data
      - ./pipelines:/app/pipelines
      - pysus_cache:/home/ingestor/pysus
    networks:
      - datasus-net

  # ---------------------------------------------------------------------------
  # Streamlit — Dashboards interativos (DuckDB + Plotly)
  # Acesso: http://localhost:8501
  # ---------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: infra/streamlit/Dockerfile
    container_name: datasus_streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      DATA_ROOT: /app/data
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-datasus_db}
      POSTGRES_USER: ${POSTGRES_USER:-datasus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datasus_secret}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_TRIAGEM: triagem-eventos
      KAFKA_TOPIC_ALERTAS: alertas-risco
    volumes:
      - ./data:/app/data
      - ./dashboards:/app/dashboards
      - ./pipelines:/app/pipelines
    networks:
      - datasus-net

  # ---------------------------------------------------------------------------
  # Analysis — Jupyter Lab + PySpark (modo local)
  # Jupyter: http://localhost:8888  (sem senha — apenas para uso local)
  # ---------------------------------------------------------------------------
  analysis:
    build:
      context: .
      dockerfile: infra/analysis/Dockerfile
    container_name: datasus_analysis
    restart: unless-stopped
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
      - ./pipelines:/app/pipelines
      - ./scripts:/app/scripts
      - ./docs:/app/docs
    networks:
      - datasus-net

  # ---------------------------------------------------------------------------
  # Spark Worker — Executor de tarefas batch
  # ---------------------------------------------------------------------------
  spark-worker:
    image: bitnami/spark:latest
    container_name: datasus_spark_worker
    restart: unless-stopped
    depends_on:
      spark:
        condition: service_healthy
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
    volumes:
      - ./data:/opt/bitnami/spark/data
      - ./pipelines:/opt/bitnami/spark/pipelines
    networks:
      - datasus-net

# =============================================================================
# Volumes nomeados para persistência
# =============================================================================
volumes:
  postgres_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:
  pysus_cache:

# =============================================================================
# Rede isolada para comunicação entre serviços
# =============================================================================
networks:
  datasus-net:
    driver: bridge
